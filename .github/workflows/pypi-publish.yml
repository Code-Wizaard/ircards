name: Publish to PyPI

on:
  push:
    branches:
      - main  # or master
  workflow_dispatch:  # allow manual trigger

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build tomli
    
    - name: Get current version from pyproject.toml
      id: current_version
      run: |
        VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Found version: $VERSION"
    
    - name: Check if version exists on PyPI
      id: check_pypi
      run: |
        PACKAGE_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
        VERSION="${{ steps.current_version.outputs.version }}"
        
        # Check if version exists on PyPI
        if pip index versions $PACKAGE_NAME 2>/dev/null | grep -q "$VERSION"; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Version $VERSION already exists on PyPI - skipping upload"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION is new - will upload to PyPI"
        fi
    
    - name: Build package
      if: steps.check_pypi.outputs.exists == 'false'
      run: python -m build
    
    - name: Publish to PyPI
      if: steps.check_pypi.outputs.exists == 'false'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}